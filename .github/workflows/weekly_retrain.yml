name: Weekly Retrain

# Runs every Sunday at 03:00 UTC.
# Full pipeline: dataset prep → model retrain → walk-forward backtest →
# ML report → learning analysis → policy optimization.
#
# Binary model files (.pkl) are uploaded as GitHub Actions artifacts
# (90-day retention) rather than committed to git.  JSON reports and
# ELO state are committed back so the app always reads fresh data.

on:
  schedule:
    - cron: "0 3 * * 0"   # 03:00 UTC every Sunday
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # walk-forward trains 5 models × 5 folds
    permissions:
      contents: write      # needed to commit artifacts back

    env:
      SECRET_KEY: ci-placeholder-not-used
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      NBA_API_KEY: ${{ secrets.NBA_API_KEY }}
      ANTHROPIC_API_KEY: ""
      FLASK_DEBUG: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly retrain pipeline
        run: python weekly_retrain.py --folds 5

      - name: Upload trained models as workflow artifacts
        uses: actions/upload-artifact@v4
        if: always()       # upload even if a later step failed
        with:
          name: scorpred-models-${{ github.run_number }}
          path: |
            data/models/
            data/processed/soccer_elo_state.json
          retention-days: 90

      - name: Commit refreshed JSON artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "ScorPred Pipeline"

          # Stage all pipeline-generated JSON/CSV artifacts.
          # Exclude binary model files — stored as workflow artifacts instead.
          git add --force \
            data/analysis/ \
            data/backtests/ \
            data/processed/soccer_elo_state.json \
            cache/prediction_tracking.json \
            data/processed/soccer_training_data_clean.csv \
            cache/ml/ \
            data/logs/ \
            || true

          git diff --staged --quiet && echo "Nothing to commit." && exit 0

          git commit -m "chore(pipeline): weekly retrain $(date -u '+%Y-%m-%d') [skip ci]"
          git push
