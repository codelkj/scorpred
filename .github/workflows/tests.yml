name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      SECRET_KEY: test-secret-key-for-ci-only
      API_FOOTBALL_KEY: test-football-key
      NBA_API_KEY: test-nba-key
      ANTHROPIC_API_KEY: ""
      FLASK_DEBUG: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff

      - name: Auto-resolve app.py conflicts (if markers exist)
        run: grep -q '^<<<<<<< ' app.py && python scripts/resolve_app_conflict.py app.py --strategy=ours || true

      - name: Lint conflict-tooling surface (ruff)
        run: ruff check scripts/resolve_app_conflict.py tests/test_conflict_resolver.py --select E,W,F --ignore E501 --output-format=github

      - name: Run tests
        run: pytest tests -q --tb=short
