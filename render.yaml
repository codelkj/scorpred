services:
  - type: web
    name: scorpred
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        sync: false
      - key: SCORPRED_DATA_ROOT
        value: /tmp/scorpred
      - key: API_FOOTBALL_HOST
        value: free-api-live-football-data.p.rapidapi.com
      - key: API_FOOTBALL_BASE_URL
        value: https://free-api-live-football-data.p.rapidapi.com
      - key: API_FOOTBALL_MODE
        value: rapidapi
      - key: NBA_API_HOST
        value: nba-api-free-data.p.rapidapi.com
      - key: NBA_API_BASE_URL
        value: https://nba-api-free-data.p.rapidapi.com
      - key: API_FOOTBALL_KEY
        sync: false
      - key: NBA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
